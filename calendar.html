<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>현서이님-작업 캘린더</title>
    <style>
        /* [1. 임베드 최적화 리셋] */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { 
            margin: 0; padding: 0; width: 100%; height: auto;
            background-color: transparent; /* 배경을 투명하게 하여 부모 페이지와 조화 */
            font-family: 'Pretendard', sans-serif;
            overflow-x: hidden; /* 가로 스크롤 방지 */
        }

        /* [폰트 설정] */
        @font-face {
            font-family: 'Paperozi';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-4Regular.woff2') format('woff2');
            font-weight: 700; font-display: swap;
        }
        @font-face {
            font-family: 'Pretendard';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/pretendard@1.0/Pretendard-Regular.woff2') format('woff2');
            font-weight: 400; font-display: swap;
        }

        :root {
            --bg: #fff8cc; --line: #f2bd2f; --cell: #fffae5; --cell-outside: #fff1cf;
            --today-bg: #fffbe8; --today-line: #ffa600; --text-strong: #3f2d21; --text-soft: #8b7347;
            --closed-bg: #ffeeb0; --closed-text: #8a5a05; --closed-border: #ff9a26;
            --holiday-bg: #ffdfdf; --holiday-text: #d32f2f; --holiday-border: #f44336;
        }

        /* [2. 전체 레이아웃 중앙 정렬] */
        .calendarSection { 
            width: 100%; max-width: 900px; margin: 0 auto; 
            padding: 10px; /* 모바일에서 좌우 짤림 방지용 최소 여백 */
            display: flex; flex-direction: column; align-items: center;
        }
        
        /* 상단 타이틀 바 최적화 */
        .statusHeader { width: 100%; display: flex; justify-content: center; padding-bottom: 15px; }
        .statusTitlePill {
            display: inline-flex; align-items: center; gap: 10px;
            min-height: 46px; padding: 0 20px; border-radius: 999px; background: #ffd84f;
            color: #2f231d; font-family: 'Paperozi', sans-serif; font-size: 22px; font-weight: 700;
            box-shadow: 0 4px 10px rgba(255, 214, 79, 0.25);
            white-space: nowrap;
        }
        .statusTitlePill .dot { width: 8px; height: 8px; border-radius: 50%; background: #fffdf6; }

        /* 달력 메인 박스 */
        .scalendar {
            width: 100%; padding: 15px; border-radius: 20px; background: var(--bg);
            box-shadow: inset 0 0 0 4px #ffd95e, inset 0 0 0 6px #f1b300, 0 10px 20px rgba(255, 214, 79, 0.15);
        }
        
        .scalendar__head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
        .scalendar__tabs { display: flex; gap: 6px; }
        .scalendar__tab { 
            padding: 6px 14px; border-radius: 999px; border: 1px solid #ebc75c; 
            background: #fff6d8; cursor: pointer; font-weight: 800; font-size: 13px; color: var(--text-strong);
        }
        .scalendar__tab.is-active { background: #ffd84f; border-color: #e2ae28; }
        .scalendar__title { font-size: 19px; font-weight: 800; color: var(--text-strong); font-family: 'Paperozi'; }

        /* [3. 그리드 최적화 - 짤림 방지] */
        .scalendar__weekdays { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 8px; text-align: center; font-weight: 800; color: var(--text-soft); font-size: 12px; }
        .scalendar__grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; width: 100%; }
        
        /* 셀 디자인 (세로 높이 더 줄임) */
        .scalendar__cell { 
            min-height: 48px; padding: 6px; border-radius: 12px; border: 1px solid #f4d879; 
            background: var(--cell); display: flex; flex-direction: row; align-items: center; justify-content: space-between;
        }
        .scalendar__cell.is-outside { background: var(--cell-outside); opacity: 0.4; }
        .scalendar__cell.is-today { border: 2px solid var(--today-line); background: var(--today-bg); }
        .scalendar__cell.is-closed { background: #fff0ba; }
        .scalendar__cell.is-holiday { background: #ffeaea; }

        .scalendar__date { font-size: 13px; font-weight: 800; }
        .is-sun { color: #ee8a6d; }

        .scalendar__badge { 
            padding: 2px 6px; border-radius: 5px; font-size: 10px; font-weight: 800; white-space: nowrap;
        }
        .scalendar__badge.closed { background: var(--closed-bg); color: var(--closed-text); border: 1px solid var(--closed-border); }
        .scalendar__badge.holiday { background: var(--holiday-bg); color: var(--holiday-text); border: 1px solid var(--holiday-border); }
        
        .scalendar__footer { margin-top: 15px; padding-top: 10px; border-top: 1px dashed #efd36a; font-size: 13px; text-align: center; color: var(--text-soft); }

        /* [4. 모바일 전용 극단적 최적화] */
        @media screen and (max-width: 480px) {
            .calendarSection { padding: 5px; } /* 외부 여백 최소화 */
            .scalendar { padding: 10px; border-radius: 16px; }
            .scalendar__cell { 
                min-height: 42px; padding: 4px; 
                flex-direction: column; align-items: center; justify-content: center; /* 모바일은 좁으므로 위아래 배치 */
            }
            .scalendar__date { font-size: 11px; margin-bottom: 2px; }
            .scalendar__badge { font-size: 8px; padding: 1px 3px; width: 100%; text-align: center; }
            .statusTitlePill { font-size: 17px; min-height: 38px; padding: 0 15px; }
            .scalendar__title { font-size: 16px; }
            .scalendar__tab { padding: 5px 10px; font-size: 11px; }
        }
    </style>
</head>
<body>

    <div class="calendarSection">
        <div class="statusHeader">
            <div class="statusTitlePill">
                <span class="dot"></span>
                작업 예약 현황
                <span class="dot"></span>
            </div>
        </div>
        <div id="scheduleCalendar"></div>
    </div>

    <script>
        (() => {
            const CONFIG = {
                mountSelector: "#scheduleCalendar",
                settingsCsvUrl: "https://docs.google.com/spreadsheets/d/e/2PACX-1vQH8jUVjx9wTBIhjeeMpSD1g3F_HFetxJ11UvBqk30U8XVYurBlovsadmXPhYsEaTh-fNeKZCSuLf1K/pub?gid=1605197333&single=true&output=csv",
                datesCsvUrl: "https://docs.google.com/spreadsheets/d/e/2PACX-1vQH8jUVjx9wTBIhjeeMpSD1g3F_HFetxJ11UvBqk30U8XVYurBlovsadmXPhYsEaTh-fNeKZCSuLf1K/pub?gid=1856773656&single=true&output=csv",
                monthTabCount: 2
            };

            function normalizeDate(dateStr) {
                if (!dateStr) return "";
                const parts = dateStr.replace(/[^0-9]/g, '-').split('-').filter(p => p !== "");
                if (parts.length < 3) return "";
                return `${parts[0]}-${parts[1].padStart(2, '0')}-${parts[2].padStart(2, '0')}`;
            }

            function parseCSV(text) {
                const rows = text.split(/\r?\n/).map(row => row.split(','));
                if (rows.length < 1) return [];
                const headers = rows[0].map(h => h.trim().toLowerCase());
                return rows.slice(1).map(row => {
                    const obj = {};
                    headers.forEach((h, i) => { if (row[i]) obj[h] = row[i].trim(); });
                    return obj;
                });
            }

            async function init() {
                const mount = document.querySelector(CONFIG.mountSelector);
                try {
                    const [sRes, dRes] = await Promise.all([
                        fetch(CONFIG.settingsCsvUrl + "&cache=" + Date.now()).then(r => r.text()),
                        fetch(CONFIG.datesCsvUrl + "&cache=" + Date.now()).then(r => r.text())
                    ]);

                    const settingsData = parseCSV(sRes);
                    const datesData = parseCSV(dRes);

                    const settings = {};
                    settingsData.forEach(d => { if(d.key) settings[d.key] = d.value; });

                    const dateMap = new Map();
                    datesData.forEach(item => {
                        const normalized = normalizeDate(item.date);
                        if (normalized) dateMap.set(normalized, item.status || "");
                    });

                    const baseMonth = settings.active_month || new Date().toISOString().slice(0, 7);
                    const [startY, startM] = baseMonth.split('-').map(Number);
                    const months = [];
                    for(let i=0; i<CONFIG.monthTabCount; i++) months.push(new Date(startY, startM - 1 + i, 1));

                    function render(idx) {
                        const target = months[idx];
                        const year = target.getFullYear();
                        const month = target.getMonth();
                        
                        let html = `
                        <div class="scalendar">
                            <div class="scalendar__head">
                                <div class="scalendar__tabs">
                                    ${months.map((m, i) => `<button class="scalendar__tab ${i===idx?'is-active':''}" onclick="window._renderCal(${i})">${m.getMonth()+1}월</button>`).join('')}
                                </div>
                                <div class="scalendar__title">${year}.${String(month+1).padStart(2, '0')}</div>
                            </div>
                            <div class="scalendar__weekdays">
                                <div class="is-sun">일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div>토</div>
                            </div>
                            <div class="scalendar__grid">`;

                        const firstDay = new Date(year, month, 1);
                        const startDayOfWeek = firstDay.getDay();
                        const totalDays = new Date(year, month + 1, 0).getDate();
                        const rowsNeeded = Math.ceil((startDayOfWeek + totalDays) / 7);
                        const start = new Date(firstDay);
                        start.setDate(firstDay.getDate() - startDayOfWeek);

                        for (let i = 0; i < rowsNeeded * 7; i++) {
                            const d = new Date(start);
                            d.setDate(start.getDate() + i);
                            const dateKey = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
                            const status = dateMap.get(dateKey) || "";
                            const isOutside = d.getMonth() !== month ? 'is-outside' : '';
                            const isToday = dateKey === new Date().toISOString().slice(0, 10) ? 'is-today' : '';
                            
                            let stateClass = ""; let badgeClass = "";
                            if (status.includes("마감")) { stateClass = "is-closed"; badgeClass = "closed"; }
                            else if (status.includes("휴무")) { stateClass = "is-holiday"; badgeClass = "holiday"; }

                            html += `
                            <div class="scalendar__cell ${isOutside} ${isToday} ${stateClass}">
                                <span class="scalendar__date ${d.getDay()===0?'is-sun':''}">${d.getDate()}</span>
                                ${status ? `<div class="scalendar__badge ${badgeClass}">${status}</div>` : ''}
                            </div>`;
                        }
                        html += `</div><div class="scalendar__footer">${settings.available_text || ""}</div></div>`;
                        mount.innerHTML = html;
                    }
                    window._renderCal = render;
                    render(0);
                } catch (e) { mount.innerHTML = "데이터 로딩 오류"; }
            }
            init();
        })();
    </script>
</body>
</html>
